<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Movie Streaming Hub</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1em;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        form {
            background: #fff;
            padding: 2em;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 2em;
            transition: all 0.3s ease;
        }
        form:hover {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }
        input[type='text'], input[type='password'] {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            transition: border-color 0.3s ease;
        }
        input[type='text']:focus, input[type='password']:focus {
            border-color: #333;
        }
        button {
            background: #5cb85c;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #4cae4c;
        }
    </style>
</head>
<body>
    <header>
        <h1>Admin Panel - Movie Streaming Hub</h1>
    </header>
    <div class="container">
        <form id="login-form">
            <h2>Admin Login</h2>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <form id="code-generation-form">
            <h2>Access Code Generation</h2>
            <button type="button" onclick="generateAccessCode()">Generate Access Code</button>
            <p id="access-code-display"></p>
        </form>
        <form id="movie-management-form">
            <h2>Movie Management</h2>
            <input type="text" placeholder="Movie Title" required>
            <input type="text" placeholder="Director" required>
            <input type="text" placeholder="Genre" required>
            <input type="text" placeholder="Year" required>
            <button type="submit">Add Movie</button>
        </form>
    </div>
    <script>
        function generateAccessCode() {
            const code = Math.random().toString(36).substring(2, 10);
            document.getElementById('access-code-display').textContent = 'Access Code: ' + code;
        }
    </script>
</body>
</html>
